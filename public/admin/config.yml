backend:
  name: github
  repo: oblivora/aviation-desk-site
  branch: main
  base_url: https://aviation-desk-cms.vercel.app
  auth_endpoint: /api/auth
publish_mode: editorial_workflow

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Slug", name: "slug", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Airlines", "Military", "Technology", "Industry", "Incidents", "Drones", "Space", "Infrastructure"]}
      - {label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Read Time", name: "readTime", widget: "string"}
      - {label: "Dek (Subtitle)", name: "dek", widget: "text"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Image Credit", name: "imageCredit", widget: "string", required: false}
      - {label: "Publisher Name", name: "publisher", widget: "string", required: false}
      - {label: "Publisher Avatar", name: "publisherImage", widget: "image", required: false}
      - {label: "Accent Hue (0-360)", name: "accent", widget: "number", default: 4, value_type: "int"}
      - {label: "Featured", name: "featured", widget: "boolean", default: false, required: false}
      # --- Video / Live Stream (Optional for standard articles) ---
      - {label: "Video URL (YouTube/Vimeo/Live)", name: "videoUrl", widget: "string", required: false, hint: "Paste a YouTube, Vimeo, or live stream URL"}
      - {label: "Video File (Upload)", name: "videoFile", widget: "file", required: false, hint: "Upload a video file directly"}
      - {label: "Video Caption", name: "videoCaption", widget: "string", required: false}
      - {label: "Video Position", name: "videoPosition", widget: "select", options: ["end", "body"], default: "end", required: false, hint: "'body' = within article, 'end' = after article body"}
      # --- Social Media Embeds (multiple) ---
      - label: "Social Media Posts"
        name: "socialPosts"
        widget: "list"
        required: false
        hint: "Add one or more social media posts (Twitter/X, Instagram, LinkedIn)"
        fields:
          - {label: "Post URL", name: "url", widget: "string"}
          - {label: "Caption (optional)", name: "caption", widget: "string", required: false}
      # --- Event Location ---
      - {label: "Location Name", name: "locationName", widget: "string", required: false, hint: "Venue or place name"}
      - {label: "Location Address", name: "locationAddress", widget: "text", required: false}
      - {label: "Location Website", name: "locationWebsite", widget: "string", required: false}
      - {label: "Location Hours", name: "locationHours", widget: "string", required: false, hint: "e.g. 'Mon-Fri 9AM-6PM' or 'No hours available'"}
      - {label: "Location Map Query", name: "locationMapQuery", widget: "string", required: false, hint: "Google Maps search query for Get Directions"}
      - {label: "Location Contact", name: "locationContact", widget: "string", required: false, hint: "Phone number or contact URL (optional)"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "liveEvents"
    label: "Live Events"
    folder: "src/content/liveEvents"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Slug", name: "slug", widget: "string"}
      - {label: "Is Active Live Event", name: "isActive", widget: "boolean", default: true, required: false, hint: "If unchecked, the event is removed from the top Live Events section and appears as a normal article in the Latest Stories grid."}
      - {label: "Category", name: "category", widget: "select", options: ["Airlines", "Military", "Technology", "Industry", "Incidents", "Drones", "Space", "Infrastructure"]}
      - {label: "Event Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Read Time", name: "readTime", widget: "string", required: false}
      - {label: "Dek (Subtitle)", name: "dek", widget: "text"}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Image (Fallback)", name: "image", widget: "image", required: false}
      - {label: "Image Credit", name: "imageCredit", widget: "string", required: false}
      - {label: "Publisher Name", name: "publisher", widget: "string", required: false}
      - {label: "Publisher Avatar", name: "publisherImage", widget: "image", required: false}
      - {label: "Accent Hue (0-360)", name: "accent", widget: "number", default: 4, value_type: "int"}
      - {label: "Video URL (Primary Hero)", name: "videoUrl", widget: "string", required: false, hint: "Paste a YouTube, Vimeo, or live stream URL to feature at the top"}
      - {label: "Video File (Primary Hero)", name: "videoFile", widget: "file", required: false, hint: "Upload a video file directly"}
      - {label: "Video Caption", name: "videoCaption", widget: "string", required: false}
      # --- Market / Ticker (For Live Events) ---
      - label: "Market / Ticker Updates"
        name: "marketUpdates"
        widget: "list"
        required: false
        hint: "Add market movements or live ticker stats (e.g. Nifty 50: +1.2%)"
        fields:
          - {label: "Index / Symbol", name: "symbol", widget: "string", hint: "e.g. Nifty 50, BSE Sensex, AAPL"}
          - {label: "Value", name: "value", widget: "string", hint: "e.g. 24,500.25"}
          - {label: "Change", name: "change", widget: "string", hint: "e.g. +150.50 or -45.20"}
          - {label: "Trend", name: "trend", widget: "select", options: ["up", "down", "neutral"]}
      # --- Social Media Embeds (multiple) ---
      - label: "Social Media Posts"
        name: "socialPosts"
        widget: "list"
        required: false
        fields:
          - {label: "Post URL", name: "url", widget: "string"}
          - {label: "Caption (optional)", name: "caption", widget: "string", required: false}
      # --- Event Location ---
      - {label: "Location Name", name: "locationName", widget: "string", required: false, hint: "Venue or place name"}
      - {label: "Location Address", name: "locationAddress", widget: "text", required: false}
      - {label: "Location Website", name: "locationWebsite", widget: "string", required: false}
      - {label: "Location Hours", name: "locationHours", widget: "string", required: false, hint: "e.g. 'Mon-Fri 9AM-6PM' or 'No hours available'"}
      - {label: "Location Map Query", name: "locationMapQuery", widget: "string", required: false, hint: "Google Maps search query for Get Directions"}
      - {label: "Location Contact", name: "locationContact", widget: "string", required: false, hint: "Phone number or contact URL (optional)"}
      - {label: "Body", name: "body", widget: "markdown"}
